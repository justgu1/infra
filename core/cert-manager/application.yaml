apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: core
  sources:
    - repoURL: https://charts.jetstack.io
      chart: cert-manager
      targetRevision: "*"
      helm:
        releaseName: cert-manager
        values: |
          crds:
            enabled: true
    - repoURL: git@github.com:justgu1/infra.git
      targetRevision: main
      path: core/cert-manager/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m