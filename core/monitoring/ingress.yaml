---
# Grafana — OIDC direto (generic_oauth no grafana.ini)
# Sem proxy na frente; o Grafana trata o callback /login/generic_oauth ele mesmo.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - secretName: grafana-tls
      hosts:
        - grafana.justgui.dev
  rules:
    - host: grafana.justgui.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: monitoring-grafana
                port:
                  number: 80