---
# Service ExternalName — aponta para o Authentik no namespace platform-authentik
# Necessário para o ingress rotear /outpost.goauthentik.io para o Authentik
apiVersion: v1
kind: Service
metadata:
  name: authentik-outpost
  namespace: monitoring
spec:
  type: ExternalName
  externalName: authentik-helm-server.platform-authentik.svc.cluster.local
  ports:
    - port: 80
---
# Prometheus — protegido via Authentik Forward Auth
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus
  namespace: monitoring
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/auth-url: "http://authentik-helm-server.platform-authentik.svc.cluster.local/outpost.goauthentik.io/auth/nginx"
    nginx.ingress.kubernetes.io/auth-signin: "https://prometheus.justgui.dev/outpost.goauthentik.io/start?rd=$scheme://$http_host$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-response-headers: "Set-Cookie,X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid"
    nginx.ingress.kubernetes.io/auth-snippet: |
      proxy_set_header X-Forwarded-Host $http_host;
spec:
  ingressClassName: nginx
  tls:
    - secretName: prometheus-tls
      hosts:
        - prometheus.justgui.dev
  rules:
    - host: prometheus.justgui.dev
      http:
        paths:
          - path: /outpost.goauthentik.io
            pathType: ImplementationSpecific
            backend:
              service:
                name: authentik-outpost
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: monitoring-kube-prometheus-prometheus
                port:
                  number: 9090
---
# Alertmanager — protegido via Authentik Forward Auth
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alertmanager
  namespace: monitoring
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/auth-url: "http://authentik-helm-server.platform-authentik.svc.cluster.local/outpost.goauthentik.io/auth/nginx"
    nginx.ingress.kubernetes.io/auth-signin: "https://alertmanager.justgui.dev/outpost.goauthentik.io/start?rd=$scheme://$http_host$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-response-headers: "Set-Cookie,X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid"
    nginx.ingress.kubernetes.io/auth-snippet: |
      proxy_set_header X-Forwarded-Host $http_host;
spec:
  ingressClassName: nginx
  tls:
    - secretName: alertmanager-tls
      hosts:
        - alertmanager.justgui.dev
  rules:
    - host: alertmanager.justgui.dev
      http:
        paths:
          - path: /outpost.goauthentik.io
            pathType: ImplementationSpecific
            backend:
              service:
                name: authentik-outpost
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: monitoring-kube-prometheus-alertmanager
                port:
                  number: 9093
---
# Grafana — OIDC direto (sem proxy)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - secretName: grafana-tls
      hosts:
        - grafana.justgui.dev
  rules:
    - host: grafana.justgui.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: monitoring-grafana
                port:
                  number: 80