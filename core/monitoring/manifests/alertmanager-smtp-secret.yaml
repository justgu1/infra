apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-smtp-secret
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: alertmanager-smtp-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: cluster/smtp
---
# Secret com variáveis de ambiente para o Alertmanager
# (ALERT_EMAIL_TO, ALERT_EMAIL_FROM são estáticas — podem ficar aqui)
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-env
  namespace: monitoring
data:
  ALERT_EMAIL_TO: "guilherme@justgui.dev"
  ALERT_EMAIL_FROM: "alertmanager@justgui.dev"
