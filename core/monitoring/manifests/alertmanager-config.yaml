apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: global-alerts
  namespace: monitoring
  labels:
    # Label para o AlertmanagerConfig ser descoberto pelo Alertmanager do kube-prometheus-stack
    release: kube-prometheus-stack
spec:
  route:
    receiver: email-default
    groupBy: ['alertname', 'namespace']
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 12h
    routes:
      # Jobs críticos (listings-updater, whatsapp-updater) → alerta imediato
      - matchers:
          - name: severity
            value: critical
        receiver: email-default
        repeatInterval: 1h
      # Warnings → agrupados, menos urgentes
      - matchers:
          - name: severity
            value: warning
        receiver: email-default
        repeatInterval: 6h
  receivers:
    - name: email-default
      emailConfigs:
        - to: "${ALERT_EMAIL_TO}"
          from: "${ALERT_EMAIL_FROM}"
          smarthost: "${SMTP_HOST}:${SMTP_PORT}"
          authUsername: "${SMTP_USER}"
          authPassword:
            name: alertmanager-smtp-secret
            key: SMTP_PASSWORD
          requireTLS: true
          sendResolved: true
          headers:
            Subject: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}'
