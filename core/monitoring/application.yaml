apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: core
  sources:
    - repoURL: git@github.com:justgu1/kubernetes-core.git
      targetRevision: main
      path: monitoring
      directory:
        recurse: true
    - repoURL: https://github.com/justgu1/infra
      targetRevision: main
      path: core/monitoring/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 0