---
# ClusterSecretStore — permite que qualquer namespace leia secrets do Vault.
# O ESO usa AppRole auth para se autenticar.
# roleId: valor direto (ESO v1 não suporta secretRef para roleId)
# secretRef: referencia o vault-eso-auth Secret para o secret-id
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault
spec:
  provider:
    vault:
      server: http://vault.vault.svc.cluster.local:8200
      path: secret
      version: v2
      auth:
        appRole:
          path: approle
          roleId: "13744f20-fa1f-88fe-40ad-0193f72ccd8d"
          secretRef:
            name: vault-eso-auth
            namespace: external-secrets
            key: secretId
