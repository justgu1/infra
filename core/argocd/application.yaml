apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 9.4.10
    helm:
      valuesObject:
        server:
          replicas: 2
          extraArgs:
            - --insecure
          autoscaling:
            enabled: true
            minReplicas: 2
            maxReplicas: 5

        repoServer:
          replicas: 2
          autoscaling:
            enabled: true
            minReplicas: 2
            maxReplicas: 5

        controller:
          replicas: 1

        redis:
          enabled: true
          replicas: 1
          master:
            persistence:
              enabled: false

        redisSecretInit:
          enabled: false

        dex:
          enabled: false

        configs:
          cm:
            url: https://argocd.justgui.dev
            server.disable.auth: "false"
            server.x-frame-options: "SAMEORIGIN"

            oidc.config: |
              name: Authentik
              issuer: https://auth.justgui.dev/application/o/argocd/
              clientID: $oidc.authentik.clientID
              clientSecret: $oidc.authentik.clientSecret
              requestedScopes:
                - openid
                - profile
                - email
              requestedIDTokenClaims:
                email:
                  essential: true

          rbac:
            policy.default: role:readonly
            scopes: '[email]'
            policy.csv: |
              g, tkzebrola@gmail.com, role:admin

  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: applicationsets.argoproj.io
      jsonPointers:
        - /spec/preserveUnknownFields
        - /spec/conversion
        - /spec/versions

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true