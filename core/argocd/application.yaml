apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 9.4.10
    helm:
      valuesObject:
        server:
          replicas: 2
          autoscaling:
            enabled: true
            minReplicas: 2
            maxReplicas: 5
        
        repoServer:
          replicas: 2
          autoscaling:
            enabled: true
            minReplicas: 2
            maxReplicas: 5
        
        controller:
          replicas: 1
        
        redis:
          enabled: true
          replicas: 1
          master:
            persistence:
              enabled: false
        
        redisSecretInit:
          enabled: false
        
        configs:
          cm:
            # HTTPS URL
            url: https://argocd.justgui.dev
            
            # Informar proxy reverso HTTPS
            server.secure: false
            server.disable.auth: false
            server.x-frame-options: "SAMEORIGIN"
            
            # GitHub OIDC
            oidc.config: |
              name: GitHub
              issuer: https://token.actions.githubusercontent.com
              clientID: Ov23liFXjakC9R71jUAJ
              clientSecret: $oidc.github.clientSecret
              scopes:
                - openid
                - profile
                - email
          
          rbac:
            policy.default: role:readonly
            policy.csv: |
              g, justgu1, role:admin
          
          secret:
            oidc.github.clientSecret: $oidc.github.clientSecret

  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: applicationsets.argoproj.io
      jsonPointers:
        - /spec/preserveUnknownFields
        - /spec/conversion
        - /spec/versions

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true