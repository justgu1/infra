apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd
  namespace: argocd
  annotations:
    # nginx fala HTTP com o argocd-server (TLS termina aqui no nginx)
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    # Força redirect HTTP → HTTPS para o usuário final
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Suporte a WebSocket (terminal do ArgoCD)
    nginx.ingress.kubernetes.io/websocket-services: "argocd-server"
    # Cert-manager emite o certificado TLS
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - secretName: argocd-tls
      hosts:
        - argocd.justgui.dev
  rules:
    - host: argocd.justgui.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80