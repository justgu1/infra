apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-routes
  namespace: argocd

spec:
  project: infrastructure

  source:
    repoURL: https://github.com/justgu1/infra
    targetRevision: main
    path: platform/ingress-routes

  destination:
    server: https://kubernetes.default.svc

  syncPolicy:
    automated:
      prune: true
      selfHeal: true