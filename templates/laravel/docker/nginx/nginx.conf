server {
    listen 80;
    server_name _;

    root /var/www/html/public;

    # Increase if your app handles large file uploads
    client_max_body_size 100M;

    # Basic security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Serve static assets directly without hitting Octane
    # Covers compiled JS/CSS (Vite), images, fonts, favicons
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy all other requests to Octane on localhost:8000
    # Works in both docker-compose (app container = localhost via shared network trick below)
    # and Kubernetes (sidecar containers share the pod network namespace)
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Needed if you use Octane's websocket support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
    }

    # Health check endpoint — used by Kubernetes readiness/liveness probes
    # and docker-compose healthcheck. Proxied to Octane which handles /healthz.
    location = /healthz {
        access_log off;
        proxy_pass http://127.0.0.1:8000/healthz;
    }

    # Block access to hidden files (.env, .git, etc)
    location ~ /\.(?!well-known).* {
        deny all;
    }
}