# ============================================================
# Replace all APP_NAME, APP_NAMESPACE, ORG_NAME occurrences
# before applying. IMAGE_TAG is updated automatically by CI.
# ============================================================

# ── APP — Octane (Swoole) + nginx sidecar ───────────────────
#
# Both containers run in the same pod and share localhost.
# nginx serves public/ assets directly and proxies everything
# else to Octane on 127.0.0.1:8000.
#
# initContainer copies public/ to a shared emptyDir so nginx
# (which runs from nginx:alpine) can serve static files without
# needing the full app image.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: APP_NAME
  namespace: APP_NAMESPACE
  labels:
    app: APP_NAME
    component: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: APP_NAME
      component: app
  template:
    metadata:
      labels:
        app: APP_NAME
        component: app
    spec:
      volumes:
        - name: public-assets
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: APP_NAME-nginx-config

      initContainers:
        - name: copy-public
          image: ghcr.io/ORG_NAME/APP_NAME:IMAGE_TAG
          command: ["cp", "-r", "/var/www/html/public/.", "/public"]
          volumeMounts:
            - name: public-assets
              mountPath: /public

      containers:
        # Octane handles all PHP — no php-fpm
        - name: octane
          image: ghcr.io/ORG_NAME/APP_NAME:IMAGE_TAG
          env:
            - name: CONTAINER_ROLE
              value: "app"
          envFrom:
            - configMapRef:
                name: APP_NAME-config
            - secretRef:
                name: APP_NAME-secret
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

        # nginx proxies to Octane and serves static files
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: public-assets
              mountPath: /var/www/html/public
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5

---
# ── QUEUE — background job processing ───────────────────────
#
# Same image, CONTAINER_ROLE=queue.
# Safe to scale — multiple workers process jobs in parallel.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: APP_NAME-queue
  namespace: APP_NAMESPACE
  labels:
    app: APP_NAME
    component: queue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: APP_NAME
      component: queue
  template:
    metadata:
      labels:
        app: APP_NAME
        component: queue
    spec:
      containers:
        - name: queue
          image: ghcr.io/ORG_NAME/APP_NAME:IMAGE_TAG
          env:
            - name: CONTAINER_ROLE
              value: "queue"
          envFrom:
            - configMapRef:
                name: APP_NAME-config
            - secretRef:
                name: APP_NAME-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi

---
# ── SCHEDULER — replaces cron ───────────────────────────────
#
# Same image, CONTAINER_ROLE=scheduler.
# NEVER scale above 1 — duplicate instances = duplicate jobs.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: APP_NAME-scheduler
  namespace: APP_NAMESPACE
  labels:
    app: APP_NAME
    component: scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: APP_NAME
      component: scheduler
  template:
    metadata:
      labels:
        app: APP_NAME
        component: scheduler
    spec:
      containers:
        - name: scheduler
          image: ghcr.io/ORG_NAME/APP_NAME:IMAGE_TAG
          env:
            - name: CONTAINER_ROLE
              value: "scheduler"
          envFrom:
            - configMapRef:
                name: APP_NAME-config
            - secretRef:
                name: APP_NAME-secret
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi