name: APP_NAME

# Startup order:
#   db, redis, minio, mailpit  →  app (healthy)  →  nginx, queue, scheduler
#
# frontend (Vite) has no dependencies and starts independently.

services:

  # ── Database ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: APP_NAME_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_DATABASE:-APP_NAME}
      POSTGRES_USER:     ${DB_USERNAME:-APP_NAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-APP_NAME} -d ${DB_DATABASE:-APP_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app-network

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: APP_NAME_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secret}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - app-network

  # ── MinIO ─────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: APP_NAME_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console → http://localhost:9001
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  # ── Mailpit ───────────────────────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: APP_NAME_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # UI → http://localhost:8025
    networks:
      - app-network

  # ── Application — Laravel Octane (Swoole) ─────────────────────────────────
  # Waits for db and redis to be healthy, then:
  #   1. Runs migrations
  #   2. Caches config/routes/views
  #   3. Starts Octane on port 8000
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: APP_NAME_app
    restart: unless-stopped
    environment:
      CONTAINER_ROLE: app
    env_file: .env
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor        # isolate vendor — don't override with host copy
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app-network

  # ── Nginx — reverse proxy to Octane ───────────────────────────────────────
  # Serves static files from public/ directly.
  # Proxies all other requests to app:8000 via shared network.
  # Note: nginx.conf uses 127.0.0.1:8000 (works in k8s sidecar pod).
  # In compose, both containers are on the same network so we override
  # the proxy target to the service name instead.
  nginx:
    image: nginx:alpine
    container_name: APP_NAME_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app-network

  # ── Frontend — Vite dev server ────────────────────────────────────────────
  # Runs independently — no dependencies needed.
  # Hot module replacement available at http://localhost:5173
  frontend:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: APP_NAME_frontend
    restart: unless-stopped
    working_dir: /var/www/html
    command: npm run dev -- --host 0.0.0.0
    env_file: .env
    volumes:
      - .:/var/www/html
      - /var/www/html/node_modules  # isolate node_modules
    ports:
      - "5173:5173"
    networks:
      - app-network

  # ── Queue worker ──────────────────────────────────────────────────────────
  # Waits for app to be healthy (ensures migrations ran before processing jobs).
  # Scale replicas if processing is slow: docker compose up --scale queue=3
  queue:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: APP_NAME_queue
    restart: unless-stopped
    environment:
      CONTAINER_ROLE: queue
    env_file: .env
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  # ── Scheduler ─────────────────────────────────────────────────────────────
  # Runs php artisan schedule:work — replaces cron entirely.
  # Must always be a single instance — duplicate schedulers = duplicate jobs.
  scheduler:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: APP_NAME_scheduler
    restart: unless-stopped
    environment:
      CONTAINER_ROLE: scheduler
    env_file: .env
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app-network

volumes:
  pgdata:
  minio-data:

networks:
  app-network:
    driver: bridge