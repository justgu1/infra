name: Build and Deploy

on:
  push:
    branches:
      - main   # production
      - dev    # development (add a dev cluster kubeconfig if needed)

env:
  REGISTRY: ghcr.io
  # github.repository = "org/repo" e.g. justgu1/hericarealtor
  # Final image URL: ghcr.io/justgu1/hericarealtor:abc1234
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ── Job 1: Build the Docker image and push to ghcr.io ──────
  #
  # GITHUB_TOKEN is injected automatically — no extra secrets needed
  # for pushing to ghcr.io. The token has packages:write because of
  # the permission declared below.
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    # Expose the image tag so the deploy job can use it
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generates three tags for the image:
      #   abc1234        ← short git SHA (unique, immutable, used in k8s)
      #   main or dev    ← branch name (mutable, useful for latest of that branch)
      #   latest         ← only on main
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Builds the image using layer cache from previous runs (faster builds)
      # and pushes all tags in one step
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/app/Dockerfile
          push: true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Job 2: Deploy to cluster ────────────────────────────────
  #
  # Required secrets (set in repo Settings → Secrets):
  #   ENCRYPT_KEY         → key used to encrypt/decrypt .env
  #   KUBECONFIG          → base64-encoded kubeconfig for the cluster
  #   INFRA_DEPLOY_TOKEN  → GitHub PAT with write access to justgu1/infra
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: justgu1/infra
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }}
          path: infra

      # Decrypts .env.encrypted using the shared key → produces .env in memory
      - name: Decrypt .env
        run: ENCRYPT_KEY=${{ secrets.ENCRYPT_KEY }} ./envcrypt.sh decrypt

      # Reads every key=value from .env and creates/updates a k8s Secret.
      # --dry-run=client -o yaml | apply = safe upsert (create or update).
      - name: Upsert Kubernetes Secret
        run: |
          SECRET_ARGS=""
          while IFS='=' read -r key value; do
            [[ "$key" =~ ^[[:space:]]*# ]] && continue   # skip comments
            [[ -z "${key// }" ]] && continue              # skip empty lines
            value=$(printf '%s' "$value" | sed 's/[[:space:]]*#.*//' | xargs)
            SECRET_ARGS="$SECRET_ARGS --from-literal=${key}=${value}"
          done < .env

          echo "${{ secrets.KUBECONFIG }}" | base64 -d > /tmp/kubeconfig

          kubectl --kubeconfig=/tmp/kubeconfig \
            create secret generic APP_NAME-secret \
            --namespace APP_NAMESPACE \
            $SECRET_ARGS \
            --dry-run=client -o yaml | \
          kubectl --kubeconfig=/tmp/kubeconfig apply -f -

      # Updates the image tag in infra/apps/APP_NAME/deployment.yaml
      # and commits. ArgoCD detects the commit and rolls out the new image.
      - name: Update image tag in infra
        run: |
          IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
          APP_NAME="APP_NAME"   # ← replace with actual app name

          cd infra
          sed -i \
            "s|ghcr.io/.*/APP_NAME:.*|ghcr.io/${{ env.IMAGE_NAME }}:${IMAGE_TAG}|g" \
            apps/${APP_NAME}/deployment.yaml

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/${APP_NAME}/deployment.yaml
          # Only commit if there's actually a change (idempotent)
          git diff --staged --quiet || \
            git commit -m "chore(${APP_NAME}): update image to ${IMAGE_TAG} [skip ci]"
          git push