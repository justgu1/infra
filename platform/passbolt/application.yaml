apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: passbolt
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://github.com/justgu1/passbolt
    targetRevision: HEAD
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: platform-passbolt
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true