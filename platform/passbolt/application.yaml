apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: passbolt-helm
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: platform
  source:
    repoURL: https://download.passbolt.com/charts/passbolt
    chart: passbolt
    targetRevision: 2.1.0
    helm:
      valuesObject:
        app:
          fullBaseUrl: "https://passbolt.justgui.dev"

        ingress:
          enabled: true
          ingressClassName: nginx
          annotations:
            cert-manager.io/cluster-issuer: "letsencrypt-prod"
            nginx.ingress.kubernetes.io/ssl-redirect: "true"
            nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
          hosts:
            - host: passbolt.justgui.dev
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - secretName: passbolt-tls
              hosts:
                - passbolt.justgui.dev

        # OIDC via Authentik
        passboltEnv:
          plain:
            PASSBOLT_PLUGINS_SSO_PROVIDERS_OAUTH2_ENABLED: "true"
            PASSBOLT_PLUGINS_SSO_PROVIDERS_OAUTH2_PROVIDER: "authentik"
            PASSBOLT_PLUGINS_SSO_PROVIDERS_OAUTH2_SCOPE: "openid profile email"
            PASSBOLT_PLUGINS_SSO_PROVIDERS_OAUTH2_BASE_URL: "https://auth.justgui.dev"
            PASSBOLT_PLUGINS_SSO_PROVIDERS_OAUTH2_OPENID_CONNECT_CHECK_ID: "true"
            PASSBOLT_PLUGINS_SSO_PROVIDERS_OAUTH2_REDIRECT_URI: "https://passbolt.justgui.dev/sso/openid/redirect"
          secret:
            PASSBOLT_PLUGINS_SSO_PROVIDERS_OAUTH2_CLIENT_ID:
              valueFrom:
                secretKeyRef:
                  name: passbolt-oidc-secret
                  key: client_id
            PASSBOLT_PLUGINS_SSO_PROVIDERS_OAUTH2_CLIENT_SECRET:
              valueFrom:
                secretKeyRef:
                  name: passbolt-oidc-secret
                  key: client_secret

        # PostgreSQL próprio — MariaDB desabilitado
        mariadb:
          enabled: false

        postgresql:
          enabled: true
          auth:
            existingSecret: passbolt-db-secret
            secretKeys:
              adminPasswordKey: postgresql_password
              userPasswordKey: postgresql_password
          primary:
            persistence:
              enabled: true
              size: 8Gi

        email:
          existingSecret: passbolt-email-secret

  destination:
    server: https://kubernetes.default.svc
    namespace: platform-passbolt
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true