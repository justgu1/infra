apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
spec:
  description: Platform services (auth, storage, secrets)
  sourceRepos:
    - https://github.com/justgu1/infra
    - git@github.com:justgu1/authentik.git
    - git@github.com:justgu1/minio.git
    - git@github.com:justgu1/passbolt.git
    - https://charts.goauthentik.io
    - https://charts.bitnami.com/bitnami
    - https://charts.min.io
    - https://download.passbolt.com/charts/passbolt
  destinations:
    - server: https://kubernetes.default.svc
      namespace: argocd
    - server: https://kubernetes.default.svc
      namespace: platform-authentik
    - server: https://kubernetes.default.svc
      namespace: platform-minio
    - server: https://kubernetes.default.svc
      namespace: platform-passbolt
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: 'rbac.authorization.k8s.io'
      kind: ClusterRole
    - group: 'rbac.authorization.k8s.io'
      kind: ClusterRoleBinding
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/justgu1/infra
    targetRevision: HEAD
    path: platform
    directory:
      recurse: true
      include: '*/application.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true