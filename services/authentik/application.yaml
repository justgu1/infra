apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
spec:
  project: services
  sources:
    - repoURL: https://charts.goauthentik.io/
      chart: authentik
      targetRevision: "*"
      helm:
        releaseName: authentik
        valueFiles:
          - $values/authentik/values.yaml
    - repoURL: git@github.com:justgu1/kubernetes-services.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true