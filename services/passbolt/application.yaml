apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: passbolt
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: git@github.com:justgu1/kubernetes-services.git
    targetRevision: main
    path: passbolt
    helm:
      chart: passbolt
      repoURL: https://download.passbolt.com/charts/
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: passbolt
  syncPolicy:
    automated:
      prune: true
      selfHeal: true