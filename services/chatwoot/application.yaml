apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chatwoot
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: git@github.com:justgu1/kubernetes-services.git
    targetRevision: main
    path: chatwoot
    helm:
      chart: chatwoot
      repoURL: https://charts.chatwoot.com/
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: chatwoot
  syncPolicy:
    automated:
      prune: true
      selfHeal: true