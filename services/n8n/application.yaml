apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: n8n
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: git@github.com:justgu1/kubernetes-services.git
    targetRevision: main
    path: n8n
    helm:
      chart: n8n
      repoURL: https://n8n-io.github.io/n8n-helm/
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: n8n
  syncPolicy:
    automated:
      prune: true
      selfHeal: true