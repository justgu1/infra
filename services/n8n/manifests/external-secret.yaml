apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: n8n-credentials
  namespace: n8n
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: n8n-credentials
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: secret/cluster/n8n
