apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app-base.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "app-base.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "app-base.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "app-base.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "app-base.fullname" . }}
      {{- end }}

      initContainers:
        {{- if .Values.initContainers.copyPublic }}
        # Copies /var/www/public into the shared emptyDir so the nginx sidecar can serve static assets
        - name: copy-public
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["sh", "-c", "cp -r /var/www/public/. /shared-public/"]
          volumeMounts:
            - name: public-dir
              mountPath: /shared-public
        {{- end }}
        {{- if .Values.initContainers.migrate.enabled }}
        - name: migrate
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: {{ toJson .Values.initContainers.migrate.command }}
          envFrom:
            {{- if .Values.configMap.data }}
            - configMapRef:
                name: {{ include "app-base.configMapName" . }}
            {{- end }}
            {{- if or .Values.sealedSecret.enabled .Values.externalSecret.enabled }}
            - secretRef:
                name: {{ include "app-base.secretName" . }}
            {{- end }}
        {{- end }}

      containers:
        # PHP-FPM + queue worker + scheduler (via supervisord)
        - name: php-fpm
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.fpm.port }}
              name: fpm
          envFrom:
            {{- if .Values.configMap.data }}
            - configMapRef:
                name: {{ include "app-base.configMapName" . }}
            {{- end }}
            {{- if or .Values.sealedSecret.enabled .Values.externalSecret.enabled }}
            - secretRef:
                name: {{ include "app-base.secretName" . }}
            {{- end }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.fpm.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources.app | nindent 12 }}

        {{- if .Values.nginx.enabled }}
        # nginx sidecar — HTTP :80 → FastCGI localhost:9000
        - name: nginx
          image: {{ .Values.nginx.image }}
          ports:
            - containerPort: {{ .Values.nginx.port }}
              name: http
          volumeMounts:
            - name: public-dir
              mountPath: /var/www/public
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.nginx.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources.nginx | nindent 12 }}
        {{- end }}

      volumes:
        {{- if .Values.nginx.enabled }}
        - name: public-dir
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: {{ include "app-base.fullname" . }}-nginx
        {{- end }}
