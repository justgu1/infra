apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "job-base.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "job-base.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.schedule | quote }}
  {{- with .Values.timeZone }}
  timeZone: {{ . | quote }}
  {{- end }}
  concurrencyPolicy: {{ .Values.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "job-base.selectorLabels" . | nindent 12 }}
        spec:
          restartPolicy: {{ .Values.restartPolicy }}
          {{- if .Values.serviceAccount.create }}
          serviceAccountName: {{ include "job-base.fullname" . }}
          {{- end }}
          containers:
            - name: {{ include "job-base.fullname" . }}
              image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              envFrom:
                {{- if .Values.configMap.data }}
                - configMapRef:
                    name: {{ include "job-base.configMapName" . }}
                {{- end }}
                {{- if .Values.externalSecret.enabled }}
                - secretRef:
                    name: {{ include "job-base.secretName" . }}
                {{- end }}
                {{- if .Values.externalSecretRef.name }}
                - secretRef:
                    name: {{ .Values.externalSecretRef.name }}
                {{- end }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
              {{- if .Values.shm.enabled }}
              volumeMounts:
                - name: dshm
                  mountPath: /dev/shm
              {{- end }}
          {{- if .Values.shm.enabled }}
          volumes:
            - name: dshm
              emptyDir:
                medium: Memory
                sizeLimit: {{ .Values.shm.size | quote }}
          {{- end }}
