image:
  repository: saladdinha/chatwoot-whatsapp-version-updater
  tag: latest

schedule: "0 0 * * *"
timeZone: "UTC"
concurrencyPolicy: Forbid

serviceAccount:
  create: true

rbac:
  enabled: true
  rules:
    - apiGroups: [""]
      resources: ["pods"]
      verbs: ["get", "list", "delete", "create"]
    - apiGroups: [""]
      resources: ["pods/exec"]
      verbs: ["create"]
    - apiGroups: ["apps"]
      resources: ["deployments"]
      verbs: ["get", "patch"]

externalSecret:
  enabled: true
  # Vault path: secret/data/whatsapp-updater
  # Campos esperados: (herdado do chatwoot-secrets via externalSecretRef)

# Reutiliza o secret do app pai via ExternalSecret próprio no Vault
externalSecretRef:
  name: chatwoot-secrets

sealedSecret:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
