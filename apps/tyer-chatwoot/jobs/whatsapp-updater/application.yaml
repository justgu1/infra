apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: whatsapp-updater
  namespace: argocd
spec:
  project: apps
  sources:
    - repoURL: git@github.com:justgu1/infra.git
      targetRevision: main
      path: charts/job-base
      helm:
        releaseName: whatsapp-updater
        valueFiles:
          - $values/apps/tyer-chatwoot/jobs/whatsapp-updater/values.yaml
    - repoURL: git@github.com:justgu1/infra.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: chatwoot-tyer
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
